<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Anderson</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
font-family:Georgia, serif;
background:
radial-gradient(circle at top,#3b0a73 0%,#120028 35%,#04020d 100%);
color:white;
position:relative;
}

.stars{
position:absolute;
width:100%;
height:100%;
background-image:
radial-gradient(white 1px, transparent 1px);
background-size:40px 40px;
opacity:.35;
animation: twinkle 6s ease-in-out infinite;
}

@keyframes twinkle{
50%{opacity:.7;}
}

.container{
text-align:center;
padding:20px;
z-index:2;
max-width:90%;
animation: fadeIn 2s ease forwards;
}

h1{
font-size:4rem;
line-height:1.1;
opacity:0;
transform:translateY(40px);
animation:titleAppear 2.5s ease forwards;
text-shadow:
0 0 12px rgba(255,255,255,.6),
0 0 25px rgba(170,120,255,.7);
}

.subtitle{
margin-top:35px;
font-size:2rem;
font-style:italic;
color:#f0d7ff;
opacity:0;
transform:translateY(30px);
animation:titleAppear 2.5s ease forwards;
animation-delay:1.2s;
text-shadow:0 0 15px rgba(210,140,255,.6);
}

@keyframes titleAppear{
to{
opacity:1;
transform:translateY(0);
}
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

.floating{
position:absolute;
font-size:34px;
animation:float linear infinite;
opacity:.85;
}

@keyframes float{
from{
transform:translateY(110vh) rotate(0deg);
}
to{
transform:translateY(-120px) rotate(360deg);
}
}

.corner{
position:absolute;
font-size:38px;
color:#dca8ff;
opacity:.8;
}

.top-left{top:15px;left:15px;}
.top-right{top:15px;right:15px;}
.bottom-left{bottom:15px;left:15px;}
.bottom-right{bottom:15px;right:15px;}

</style>
</head>

<body>

<div class="stars"></div>

<div class="corner top-left">✦</div>
<div class="corner top-right">✦</div>
<div class="corner bottom-left">✦</div>
<div class="corner bottom-right">✦</div>

<div class="container">
<h1>
I love you,<br>
my Anderson,<br>
more than<br>
anything.
</h1>

<div class="subtitle">
You are my favorite melody in the universe.
</div>
</div>

<script>

const symbols = [
"🦋","💜","✨","🎼","🎵","🎶","⭐","🌙","🕯️"
];

for(let i=0;i<35;i++){

const el=document.createElement("div");
el.className="floating";

el.textContent=symbols[
Math.floor(Math.random()*symbols.length)
];

el.style.left=Math.random()*100+"vw";
el.style.animationDuration=(10+Math.random()*12)+"s";
el.style.animationDelay=(-Math.random()*15)+"s";

document.body.appendChild(el);

}

</script>

</body>
</html>

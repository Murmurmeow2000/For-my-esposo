<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Anderson</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
font-family:Georgia, serif;
background:
radial-gradient(circle at top,#4b1e7a 0%,#130824 35%,#050814 100%);
position:relative;
color:white;
}

.stars{
position:absolute;
width:100%;
height:100%;
background-image:
radial-gradient(white 1px, transparent 1px);
background-size:40px 40px;
opacity:.35;
animation:twinkle 6s infinite alternate;
}

@keyframes twinkle{
from{opacity:.2;}
to{opacity:.5;}
}

.content{
position:relative;
z-index:5;
text-align:center;
max-width:850px;
padding:30px;
animation:fadeIn 3s ease;
}

h1{
font-size:3rem;
line-height:1.2;
text-shadow:
0 0 15px rgba(255,255,255,.7),
0 0 35px rgba(180,120,255,.5);
}

p{
margin-top:25px;
font-size:1.8rem;
color:#f0c8ff;
font-style:italic;
text-shadow:0 0 12px rgba(255,150,255,.5);
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.guitar{
position:absolute;
left:3%;
bottom:5%;
font-size:150px;
opacity:.9;
filter:drop-shadow(0 0 20px #a855ff);
animation:float 6s ease-in-out infinite;
}

.music{
position:absolute;
right:5%;
top:15%;
font-size:45px;
color:#d7a6ff;
animation:rise 12s linear infinite;
}

@keyframes rise{
from{transform:translateY(500px);}
to{transform:translateY(-700px);}
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-15px);}
}

.butterfly{
position:absolute;
font-size:40px;
animation:float 7s ease-in-out infinite;
}

.b1{top:18%;left:18%;}
.b2{top:70%;right:18%;}
.b3{top:35%;right:10%;}

.heart{
position:absolute;
font-size:28px;
color:#ff9adf;
opacity:.7;
}

.h1{top:15%;right:25%;}
.h2{bottom:20%;left:25%;}
.h3{top:55%;left:12%;}

.candle{
position:absolute;
bottom:15px;
left:50%;
transform:translateX(-50%);
font-size:42px;
opacity:.9;
}
</style>
</head>

<body>

<div class="stars"></div>

<div class="guitar">🎸</div>

<div class="music">🎵 🎶 🎵 🎶 🎵</div>

<div class="butterfly b1">🦋</div>
<div class="butterfly b2">🦋</div>
<div class="butterfly b3">🦋</div>

<div class="heart h1">♡</div>
<div class="heart h2">♡</div>
<div class="heart h3">♡</div>

<div class="content">
<h1>
I love you,<br>
my Anderson,<br>
more than anything.
</h1>

<p>
You are my favorite melody in the universe.
</p>
</div>

<div class="candle">🕯️ 🕯️</div>

</body>
</html>
